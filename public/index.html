<!-- Admin Login Section --> 
<div id="adminLoginSection" class="admin-section">
  <h3>🔐 Admin Login</h3>
  <input type="password" id="adminPassword" placeholder="Enter admin password">
  <button onclick="loginToAdmin()">Login</button>
  <div id="loginMessage" style="color: red; margin-top: 10px;"></div>
</div>

<!-- Admin Panel (hidden by default) -->
<div id="adminPanel" style="display: none;" class="admin-section">
  <h3>🛠️ Admin Panel</h3>
  <button onclick="loadPlayers()">View Players</button>
  <button onclick="resetGame()">Reset Game</button>
  <button onclick="addColor()">Add New Color</button>
  <input type="text" id="newColorName" placeholder="Color name (e.g., Cyan)" style="margin-top: 10px;">
  <br>
  <pre id="playersList"></pre>
</div>

<script>
async function loginToAdmin() {
  const password = document.getElementById('adminPassword').value;
  
  try {
    const response = await fetch('/api/admin/login', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ password })
    });
    
    const data = await response.json();
    
    if (data.success) {
      document.getElementById('adminLoginSection').style.display = 'none';
      document.getElementById('adminPanel').style.display = 'block';
    } else {
      document.getElementById('loginMessage').innerText = 'Wrong password!';
    }
  } catch (error) {
    document.getElementById('loginMessage').innerText = 'Login failed';
  }
}

async function play() {
    let name = document.getElementById("name").value;
    let zone = document.getElementById("zone").value;

    let res = await fetch("/play", {
        method: "POST",
        headers: {
            "Content-Type": "application/json"
        },
        body: JSON.stringify({ name, zone })
    });

    let data = await res.json();

    if (data.error) {
        alert(data.error);
        return;
    }

    document.getElementById("result").innerHTML = `
        🎉 Result 🎉 <br>
        Name: ${data.name}<br>
        Zone: ${data.zone}<br>
        Color: ${data.color}
    `;

    document.getElementById("colorBox").style.background = data.color.toLowerCase();
}

// ADMIN FUNCTIONS
async function loadPlayers() {
    let res = await fetch("/api/players");
    let data = await res.json();
    document.getElementById("playersList").textContent = JSON.stringify(data, null, 2);
}

async function resetGame() {
    if(confirm("Reset all players?")) {
        await fetch("/api/admin/players", { method: "DELETE" });
        alert("Game reset! All players deleted.");
        document.getElementById("playersList").textContent = "";
    }
}

async function addColor() {
    let colorName = document.getElementById("newColorName").value;
    if(!colorName) {
        alert("Enter a color name!");
        return;
    }
    
    let res = await fetch("/api/admin/colors", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ name: colorName, value: colorName })
    });
    
    let data = await res.json();
    alert(data.message);
    document.getElementById("newColorName").value = "";
}
</script>
