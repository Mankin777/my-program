<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Color Game</title>

<style>
/*Created by King 😁*/

body {
    font-family: Arial;
    background: linear-gradient(135deg, #1e1e2f, #3a3a5f);
    color: white;
    text-align: center;
}

/* HEADER */
.ministry-header {
  background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
  padding: 1.5rem;
  border-bottom: 4px solid gold;
  margin-bottom: 2rem;
}

.ministry-title h1 {
  font-size: 1.3rem;
  background: linear-gradient(135deg, #fff, #ffd700);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
}

/* FORM */
.container {
    margin-top: 20px;
}

input {
    padding: 12px;
    margin: 10px;
    width: 220px;
    border-radius: 8px;
    border: none;
}

button {
    padding: 12px 20px;
    background: orange;
    border: none;
    border-radius: 8px;
    cursor: pointer;
}

button:hover {
    background: darkorange;
}

/* 🎡 WHEEL */
.wheel-container {
  position: relative;
  width: 360px;
  margin: 20px auto;
}

.wheel {
  width: 100%;
  transition: transform 4s ease-out;
}

.arrow {
  position: absolute;
  top: -10px;
  left: 50%;
  transform: translateX(-50%);
  width: 40px;
}

/* RESULT */
#result {
  margin-top: 20px;
  font-weight: bold;
}

/* ADMIN */
.admin-section {
    margin-top: 30px;
    padding: 20px;
    background: rgba(0,0,0,0.3);
    border-radius: 10px;
}
</style>
</head>

<body>

<header class="ministry-header">
  <div class="ministry-title">
    <h1>✝️ THE PROLIFIC TEENS AND YOUTH MINISTRY ✝️</h1>
    <p>Raising a Generation of Purpose | Excellence | Faith</p>
  </div>
</header>

<div class="container">
    <h2>🎉 Color Game 🎉</h2>

    <input id="name" placeholder="Enter Name"><br>

    <input list="zonal" id="zones" placeholder="Enter/Search Zone"><br>

    <datalist id="zonal">
      <option value="CE AGEGE">
      <option value="CE AKUTE">
      <option value="CE AGBADO 1">
      <option value="CE AGBADO 2">
      <option value="CE ALAGBOLE">
    </datalist>

    <button onclick="play()">Spin 🎡</button>

    <!-- 🎡 WHEEL -->
    <div class="wheel-container">
        <img src="wheel.png" id="wheel" class="wheel">
        <img src="arrow.png" class="arrow">
    </div>

    <div id="result"></div>
</div>

<!-- ADMIN -->
<div id="adminLoginSection" class="admin-section">
  <h3>🔐 Admin Login</h3>
  <input type="password" id="adminPassword" placeholder="Password">
  <button onclick="loginToAdmin()">Login</button>
  <div id="loginMessage" style="color:red;"></div>
</div>

<div id="adminPanel" style="display:none;" class="admin-section">
  <h3>🛠️ Admin Panel</h3>
  <button onclick="loadPlayers()">View Players</button>
  <button onclick="resetGame()">Reset Game</button>
  <br><br>
  <input id="newColorName" placeholder="New Color">
  <button onclick="addColor()">Add</button>
  <pre id="playersList"></pre>
</div>

<script>

// 🔐 ADMIN LOGIN
async function loginToAdmin() {
  const password = document.getElementById('adminPassword').value;

  const res = await fetch('/api/admin/login', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ password })
  });

  const data = await res.json();

  if (data.success) {
    document.getElementById('adminLoginSection').style.display = 'none';
    document.getElementById('adminPanel').style.display = 'block';
  } else {
    document.getElementById('loginMessage').innerText = "Wrong password!";
  }
}

// 🎡 PLAY FUNCTION
async function play() {

    let name = document.getElementById("name").value;
    let zones = document.getElementById("zones").value;

    if (!name || !zones) {
        document.getElementById("result").innerHTML =
        "<span style='color:red;'>⚠️ Fill all fields</span>";
        return;
    }

    try {
        let res = await fetch("/play", {
            method: "POST",
            headers: {
                "Content-Type": "application/json"
            },
            body: JSON.stringify({ name, zones })
        });

        let data = await res.json();

        if (data.error) {
            document.getElementById("result").innerHTML =
            `<span style="color:red;">${data.error}</span>`;
            return;
        }

        // 🎡 SPIN
        const wheel = document.getElementById("wheel");
        let degrees = 360 * 6 + (data.index * (360 / 6));
        wheel.style.transform = `rotate(${degrees}deg)`;

        // 🎉 SHOW RESULT AFTER SPIN
        setTimeout(() => {
            document.getElementById("result").innerHTML = `
                🎉 Result 🎉 <br>
                Name: ${data.name}<br>
                Zone: ${data.zones}<br>
                Color: ${data.color}
            `;
        }, 4000);

    } catch (err) {
        document.getElementById("result").innerHTML =
        "<span style='color:red;'>❌ Error occurred</span>";
    }
}

// ADMIN FUNCTIONS
async function loadPlayers() {
    let res = await fetch("/api/players");
    let data = await res.json();
    document.getElementById("playersList").textContent = JSON.stringify(data, null, 2);
}

async function resetGame() {
    if(confirm("Reset all players?")) {
        await fetch("/api/admin/players", { method: "DELETE" });
        alert("Game reset!");
    }
}

async function addColor() {
    let name = document.getElementById("newColorName").value;

    await fetch("/api/admin/colors", {
        method: "POST",
        headers: {"Content-Type":"application/json"},
        body: JSON.stringify({ name })
    });

    alert("Color added!");
}

</script>

</body>
</html>
